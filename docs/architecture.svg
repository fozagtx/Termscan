<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 580" font-family="'Space Grotesk', 'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <linearGradient id="yellowGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D6FF34"/>
      <stop offset="100%" stop-color="#b8e020"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="580" fill="url(#bgGrad)" rx="16"/>

  <!-- Title -->
  <text x="480" y="44" text-anchor="middle" fill="#D6FF34" font-size="18" font-weight="700" letter-spacing="4" filter="url(#glow)">TERMSCAN — ARCHITECTURE</text>

  <!-- ═══════════════ BROWSER LAYER ═══════════════ -->
  <rect x="40" y="68" width="880" height="170" rx="20" fill="#1D1E19" stroke="rgba(255,255,255,0.08)" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="72" y="96" fill="#D6FF34" font-size="11" font-weight="700" letter-spacing="2">BROWSER</text>

  <!-- Landing -->
  <rect x="72" y="112" width="160" height="100" rx="14" fill="#262722" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="152" y="140" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Landing</text>
  <text x="152" y="158" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="10">Hero · Stats · FAQ</text>
  <text x="152" y="174" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="10">Video · About</text>
  <text x="152" y="198" text-anchor="middle" fill="#D6FF34" font-size="9" font-weight="600">/</text>

  <!-- Dashboard -->
  <rect x="272" y="112" width="160" height="100" rx="14" fill="#262722" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="352" y="140" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Dashboard</text>
  <text x="352" y="158" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="10">TosInput (3 tabs)</text>
  <text x="352" y="174" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="10">Paste · PDF · Email</text>
  <text x="352" y="198" text-anchor="middle" fill="#D6FF34" font-size="9" font-weight="600">/dashboard</text>

  <!-- Results -->
  <rect x="472" y="112" width="160" height="100" rx="14" fill="#262722" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="552" y="140" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Results</text>
  <text x="552" y="158" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="10">Score Card</text>
  <text x="552" y="174" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="10">Flagged Clauses</text>
  <text x="552" y="198" text-anchor="middle" fill="#5DFFC0" font-size="9" font-weight="600">severity badges</text>

  <!-- Negotiate Dialog -->
  <rect x="672" y="112" width="216" height="100" rx="14" fill="#262722" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="780" y="140" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">NegotiationDialog</text>
  <text x="780" y="158" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="10">AI-drafted email</text>
  <text x="780" y="174" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="10">Pro tips · Copy</text>
  <text x="780" y="198" text-anchor="middle" fill="#C1ADFF" font-size="9" font-weight="600">slide-up panel</text>

  <!-- Arrows between browser components -->
  <line x1="232" y1="162" x2="272" y2="162" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <line x1="432" y1="162" x2="472" y2="162" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <line x1="632" y1="162" x2="672" y2="162" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>

  <!-- fetch() arrow down -->
  <line x1="480" y1="212" x2="480" y2="290" stroke="url(#yellowGrad)" stroke-width="2.5" stroke-dasharray="6 4"/>
  <text x="496" y="256" fill="#D6FF34" font-size="10" font-weight="600">fetch()</text>

  <!-- ═══════════════ SERVER LAYER ═══════════════ -->
  <rect x="40" y="290" width="880" height="160" rx="20" fill="#1D1E19" stroke="rgba(255,255,255,0.08)" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="72" y="318" fill="#D6FF34" font-size="11" font-weight="700" letter-spacing="2">SVELTEKIT SERVER</text>
  <text x="200" y="318" fill="rgba(255,255,255,0.3)" font-size="10" font-weight="600">(Bun runtime)</text>

  <!-- API Routes box -->
  <rect x="72" y="334" width="530" height="96" rx="14" fill="#262722" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="92" y="358" fill="#fff" font-size="12" font-weight="700">API Routes</text>
  <text x="218" y="358" fill="rgba(255,255,255,0.3)" font-size="10">+server.ts</text>

  <!-- Route entries -->
  <rect x="92" y="368" width="240" height="24" rx="6" fill="rgba(214,255,52,0.08)" stroke="rgba(214,255,52,0.15)" stroke-width="1"/>
  <text x="104" y="385" fill="#D6FF34" font-size="10" font-weight="700">POST</text>
  <text x="140" y="385" fill="rgba(255,255,255,0.7)" font-size="10">/api/tos/analyze</text>

  <rect x="92" y="398" width="240" height="24" rx="6" fill="rgba(93,255,192,0.08)" stroke="rgba(93,255,192,0.15)" stroke-width="1"/>
  <text x="104" y="415" fill="#5DFFC0" font-size="10" font-weight="700">POST</text>
  <text x="140" y="415" fill="rgba(255,255,255,0.7)" font-size="10">/api/tos/analyze-pdf</text>

  <rect x="348" y="368" width="240" height="24" rx="6" fill="rgba(193,173,255,0.08)" stroke="rgba(193,173,255,0.15)" stroke-width="1"/>
  <text x="360" y="385" fill="#C1ADFF" font-size="10" font-weight="700">POST</text>
  <text x="396" y="385" fill="rgba(255,255,255,0.7)" font-size="10">/api/tos/negotiate</text>

  <rect x="348" y="398" width="240" height="24" rx="6" fill="rgba(113,246,255,0.08)" stroke="rgba(113,246,255,0.15)" stroke-width="1"/>
  <text x="360" y="415" fill="#71F6FF" font-size="10" font-weight="700">GET</text>
  <text x="392" y="415" fill="rgba(255,255,255,0.7)" font-size="10">/api/healthz</text>

  <!-- OpenRouter module -->
  <rect x="640" y="334" width="248" height="96" rx="14" fill="#262722" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="764" y="358" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">openrouter.ts</text>
  <text x="764" y="376" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="10">OpenAI SDK wrapper</text>
  <text x="764" y="396" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="10">Stateless — no DB</text>
  <text x="764" y="416" text-anchor="middle" fill="#D6FF34" font-size="9" font-weight="600">results returned directly</text>

  <!-- Connecting line from routes to module -->
  <line x1="602" y1="390" x2="640" y2="390" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>

  <!-- ═══════════════ EXTERNAL API ═══════════════ -->
  <rect x="260" y="500" width="440" height="60" rx="16" fill="#1D1E19" stroke="rgba(214,255,52,0.2)" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="300" y="528" fill="#D6FF34" font-size="11" font-weight="700" letter-spacing="2">OPENROUTER API</text>
  <text x="300" y="546" fill="rgba(255,255,255,0.4)" font-size="10">Llama 3.3 70B Instruct</text>
  <text x="530" y="528" fill="rgba(255,255,255,0.5)" font-size="10">Clause detection · Severity scoring</text>
  <text x="530" y="546" fill="rgba(255,255,255,0.5)" font-size="10">Email drafting · JSON response</text>

  <!-- Arrow from server to OpenRouter -->
  <line x1="480" y1="450" x2="480" y2="500" stroke="#D6FF34" stroke-width="2" stroke-dasharray="6 4" opacity="0.6"/>
  <text x="496" y="480" fill="#D6FF34" font-size="9" font-weight="600">OpenAI SDK</text>

  <!-- Tech badges at bottom -->
  <text x="480" y="574" text-anchor="middle" fill="rgba(255,255,255,0.2)" font-size="9" letter-spacing="3">SVELTE 5 · SVELTEKIT · TAILWIND V4 · BUN · OPENROUTER · TYPESCRIPT</text>
</svg>
